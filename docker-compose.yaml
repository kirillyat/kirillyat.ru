version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword 
    depends_on:
      - ollama
    
  ollama:
    container_name: ollama
    pull_policy: always
    build:
      context: ./ollama
    ports:
      - "11434:11434"
    restart: always