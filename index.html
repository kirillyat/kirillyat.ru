<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кирилл Яценко — Software Engineer</title>
  <meta name="description" content="Кирилл Яценко — software engineer. Бэкенд, лекции, статьи и менторство.">
  <meta property="og:title" content="Кирилл Яценко — Software Engineer">
  <meta property="og:description" content="Бэкенд, лекции, статьи и менторство.">
  <meta property="og:url" content="https://kirillyat.ru">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>☀️</text></svg>">
</head>
<body>
  <!-- SVG-фильтр преломления: лёгкое искажение фона за стеклом (Chromium) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="lg-refract" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>
  <!-- утренняя сцена: небо, солнце, река, трава -->
  <div class="day" aria-hidden="true">
    <span class="day__sky" id="skyBlob"></span>
    <span class="day__sun" id="sunBlob"></span>
    <span class="day__river"></span>
    <span class="day__grass" id="grassBlob"></span>
  </div>
  <div class="noise" aria-hidden="true"></div>
  <div class="progress" aria-hidden="true">
    <span id="progressBar"></span>
    <span class="progress__head" id="progressHead"></span>
  </div>
  <!-- стеклянная линза, следующая за курсором -->
  <div class="lens" id="lens" aria-hidden="true"></div>

  <!-- liquid glass навигация -->
  <header class="nav" id="nav">
    <div class="nav__bar">
      <a class="nav__logo" href="#top">k<span class="accent">.</span>yat</a>
      <nav class="nav__links" id="navLinks">
        <span class="nav__blob" id="navBlob"></span>
      </nav>
      <!-- настройка света дня: всплывает при наведении -->
      <div class="sun-nav" id="sunNav">
        <button class="sun-nav__btn" id="sunNavBtn" aria-haspopup="true" aria-label="Daylight settings">
          <span class="sun-nav__icon" id="sunNavIcon"></span>
        </button>
        <div class="sun-pop sun-card" id="sunCard">
          <p class="sun-card__title mono" id="sunTitle"></p>
          <div class="sun-card__sky" id="sunSky">
            <div class="sun-card__stars" id="sunStars"></div>
            <div class="sun-card__arc"></div>
            <div class="sun-card__sun" id="sunDot"></div>
            <div class="sun-card__horizon" id="sunHorizon"></div>
          </div>
          <div class="sun-card__meta">
            <span class="sun-card__time mono" id="sunTime">06:30</span>
            <span class="sun-card__caption" id="sunCaption"></span>
          </div>
          <div class="sun-card__presets" id="sunPresets"></div>
          <p class="sun-card__hint mono" id="sunHint"></p>
        </div>
      </div>
      <div class="lang-switch" id="langSwitch" role="tablist" aria-label="Language">
        <span class="lang-switch__thumb" id="langThumb"></span>
        <button data-lang="ru" role="tab">RU</button>
        <button data-lang="en" role="tab">EN</button>
        <button data-lang="fr" role="tab">FR</button>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- ============ HERO ============ -->
    <section class="hero" id="hero">
      <canvas id="heroCanvas" aria-hidden="true"></canvas>
      <div class="hero__inner">
        <p class="hero__hello mono" id="heroHello"></p>
        <h1 class="hero__name" id="heroName" data-plx="-0.1"></h1>
        <div class="hero__below">
          <div class="hero__role mono">
            <span class="accent">▸</span>&nbsp;<span id="typewriter"></span><span class="caret">▍</span>
          </div>
          <p class="hero__tagline" id="heroTagline"></p>
          <div class="hero__cta">
            <a href="#mentoring" class="btn btn--primary" id="ctaMentor"></a>
            <a href="#contact" class="btn btn--ghost" id="ctaContact"></a>
          </div>
        </div>
      </div>
      <a class="hero__scroll mono" href="#about" aria-label="scroll down">
        <span id="scrollLabel"></span>
        <span class="hero__scroll-line"></span>
      </a>
    </section>

    <!-- ============ MARQUEE ============ -->
    <div class="marquee" aria-hidden="true">
      <div class="marquee__track" id="marqueeTrack"></div>
    </div>

    <!-- ============ ABOUT / BENTO ============ -->
    <section class="section" id="about">
      <span class="section__ghost" data-plx="0.06" aria-hidden="true">01</span>
      <p class="section__overline mono reveal" id="aboutOver"></p>
      <h2 class="section__title reveal" id="aboutTitle"></h2>
      <div class="bento" id="bentoGrid"></div>
    </section>

    <!-- ============ EXPERIENCE ============ -->
    <section class="section" id="experience">
      <span class="section__ghost" data-plx="0.06" aria-hidden="true">02</span>
      <p class="section__overline mono reveal" id="expOver"></p>
      <h2 class="section__title reveal" id="expTitle"></h2>
      <div class="timeline" id="timeline"></div>
    </section>

    <!-- ============ SKILLS ============ -->
    <section class="section" id="skills">
      <span class="section__ghost" data-plx="0.06" aria-hidden="true">03</span>
      <p class="section__overline mono reveal" id="skillsOver"></p>
      <h2 class="section__title reveal" id="skillsTitle"></h2>
      <div class="skills" id="skillsGrid"></div>
    </section>

    <!-- ============ MATERIALS ============ -->
    <section class="section" id="materials">
      <span class="section__ghost" data-plx="0.06" aria-hidden="true">04</span>
      <p class="section__overline mono reveal" id="matOver"></p>
      <h2 class="section__title reveal" id="matTitle"></h2>
      <div class="filters reveal" id="matFilters"></div>
      <div class="materials" id="matList"></div>
    </section>

    <!-- ============ MENTORING ============ -->
    <section class="section" id="mentoring">
      <span class="section__ghost" data-plx="0.06" aria-hidden="true">05</span>
      <p class="section__overline mono reveal" id="menOver"></p>
      <h2 class="section__title reveal" id="menTitle"></h2>
      <p class="mentoring__lead reveal" id="menLead"></p>
      <div class="mentoring">
        <div class="mentoring__points" id="menPoints"></div>
        <form class="mentoring__form reveal" id="menForm">
          <div class="field">
            <label class="mono" for="mfName" id="mfNameLabel"></label>
            <input type="text" id="mfName" required>
          </div>
          <div class="field">
            <label class="mono" for="mfGoal" id="mfGoalLabel"></label>
            <select id="mfGoal"></select>
          </div>
          <div class="field">
            <label class="mono" for="mfMsg" id="mfMsgLabel"></label>
            <textarea id="mfMsg" rows="4"></textarea>
          </div>
          <button type="submit" class="btn btn--primary" id="mfSubmit"></button>
          <p class="mentoring__hint mono" id="mfHint"></p>
        </form>
      </div>
    </section>

    <!-- ============ CONTACT ============ -->
    <section class="section section--contact" id="contact">
      <span class="section__ghost section__ghost--center" data-plx="0.06" aria-hidden="true">06</span>
      <p class="section__overline mono reveal" id="contactOver"></p>
      <h2 class="section__title reveal" id="contactTitle"></h2>
      <p class="contact__lead reveal" id="contactLead"></p>
      <button class="contact__email reveal" id="emailBtn">
        <span id="emailText"></span>
        <span class="contact__copy mono" id="copyHint"></span>
      </button>
      <div class="contact__socials reveal" id="socials"></div>
    </section>
  </main>

  <footer class="footer">
    <span class="mono" id="footerLeft"></span>
    <span class="mono footer__hint" id="footerHint"></span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
