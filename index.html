<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кирилл Яценко — Software Engineer</title>
  <meta name="description" content="Кирилл Яценко — software engineer. Бэкенд, лекции, статьи и менторство.">
  <meta property="og:title" content="Кирилл Яценко — Software Engineer">
  <meta property="og:description" content="Бэкенд, лекции, статьи и менторство.">
  <meta property="og:url" content="https://kirillyat.ru">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌿</text></svg>">
</head>
<body>
  <!-- северное сияние на фоне -->
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  <div class="noise" aria-hidden="true"></div>
  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

  <header class="nav" id="nav">
    <a class="nav__logo" href="#top">k<span class="accent">.</span>yat</a>
    <nav class="nav__links" id="navLinks"></nav>
    <div class="nav__actions">
      <div class="lang-switch" id="langSwitch" role="tablist" aria-label="Language">
        <span class="lang-switch__thumb" id="langThumb"></span>
        <button data-lang="ru" role="tab">RU</button>
        <button data-lang="en" role="tab">EN</button>
        <button data-lang="fr" role="tab">FR</button>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- ============ HERO ============ -->
    <section class="hero" id="hero">
      <canvas id="heroCanvas" aria-hidden="true"></canvas>
      <div class="hero__inner">
        <div class="hero__left">
          <p class="hero__hello mono" id="heroHello"></p>
          <h1 class="hero__name" id="heroName"></h1>
          <div class="hero__role mono">
            <span class="accent">$</span>&nbsp;<span id="typewriter"></span><span class="caret">▍</span>
          </div>
          <p class="hero__tagline" id="heroTagline"></p>
          <div class="hero__cta">
            <a href="#mentoring" class="btn btn--primary" id="ctaMentor"></a>
            <a href="#contact" class="btn btn--ghost" id="ctaContact"></a>
          </div>
        </div>

        <!-- интерактивный терминал — главная фишка -->
        <div class="term" id="term">
          <div class="term__bar">
            <span class="term__dot term__dot--r"></span>
            <span class="term__dot term__dot--y"></span>
            <span class="term__dot term__dot--g"></span>
            <span class="mono term__title">guest@kirillyat.ru:~</span>
          </div>
          <div class="term__body mono" id="termBody"></div>
          <div class="term__input-row mono">
            <span class="accent">$</span>
            <input type="text" id="termInput" autocomplete="off" spellcheck="false" aria-label="terminal input">
          </div>
          <div class="term__chips" id="termChips"></div>
        </div>
      </div>
      <a class="hero__scroll mono" href="#about" aria-label="scroll down">
        <span id="scrollLabel"></span>
        <span class="hero__scroll-line"></span>
      </a>
    </section>

    <!-- ============ MARQUEE ============ -->
    <div class="marquee" aria-hidden="true">
      <div class="marquee__track" id="marqueeTrack"></div>
    </div>

    <!-- ============ ABOUT / BENTO ============ -->
    <section class="section" id="about">
      <h2 class="section__title reveal"><span class="section__num mono">01</span><span id="aboutTitle"></span></h2>
      <div class="bento" id="bentoGrid"></div>
    </section>

    <!-- ============ EXPERIENCE ============ -->
    <section class="section" id="experience">
      <h2 class="section__title reveal"><span class="section__num mono">02</span><span id="expTitle"></span></h2>
      <div class="timeline" id="timeline"></div>
    </section>

    <!-- ============ SKILLS ============ -->
    <section class="section" id="skills">
      <h2 class="section__title reveal"><span class="section__num mono">03</span><span id="skillsTitle"></span></h2>
      <div class="skills" id="skillsGrid"></div>
    </section>

    <!-- ============ MATERIALS ============ -->
    <section class="section" id="materials">
      <h2 class="section__title reveal"><span class="section__num mono">04</span><span id="matTitle"></span></h2>
      <div class="filters reveal" id="matFilters"></div>
      <div class="materials" id="matList"></div>
    </section>

    <!-- ============ MENTORING ============ -->
    <section class="section" id="mentoring">
      <h2 class="section__title reveal"><span class="section__num mono">05</span><span id="menTitle"></span></h2>
      <p class="mentoring__lead reveal" id="menLead"></p>
      <div class="mentoring">
        <div class="mentoring__points" id="menPoints"></div>
        <form class="mentoring__form reveal" id="menForm">
          <div class="field">
            <label class="mono" for="mfName" id="mfNameLabel"></label>
            <input type="text" id="mfName" required>
          </div>
          <div class="field">
            <label class="mono" for="mfGoal" id="mfGoalLabel"></label>
            <select id="mfGoal"></select>
          </div>
          <div class="field">
            <label class="mono" for="mfMsg" id="mfMsgLabel"></label>
            <textarea id="mfMsg" rows="4"></textarea>
          </div>
          <button type="submit" class="btn btn--primary" id="mfSubmit"></button>
          <p class="mentoring__hint mono" id="mfHint"></p>
        </form>
      </div>
    </section>

    <!-- ============ CONTACT ============ -->
    <section class="section section--contact" id="contact">
      <h2 class="section__title reveal"><span class="section__num mono">06</span><span id="contactTitle"></span></h2>
      <p class="contact__lead reveal" id="contactLead"></p>
      <button class="contact__email reveal" id="emailBtn">
        <span id="emailText"></span>
        <span class="contact__copy mono" id="copyHint"></span>
      </button>
      <div class="contact__socials reveal" id="socials"></div>
    </section>
  </main>

  <footer class="footer">
    <span class="mono" id="footerLeft"></span>
    <span class="mono footer__hint" id="footerHint"></span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
